services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    image: ghcr.io/mcalero11/nc-dashboard/api:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env.api
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - api-data:/app/apps/api/data

  web:
    image: ghcr.io/mcalero11/nc-dashboard/web:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - API_INTERNAL_URL=http://api:3001

volumes:
  redis-data:
  api-data:
